services:
  mongo:
    image: mongo:latest
    container_name: sticky-notes-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    container_name: sticky-notes-server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: rahul_secret_key_123
      MONGODB_URI: mongodb://mongo:27017/stickynotes
    depends_on:
      - mongo

  client:
    build: ./client
    container_name: sticky-notes-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      REACT_APP_API_URL: http://localhost:5000

volumes:
  mongo_data: